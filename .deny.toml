# all-features = true
# features = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
  # burn depends on an unmaintained package 'paste'
  "RUSTSEC-2024-0436",
  # ammonia: SVG/MathML mutation XSS
  "RUSTSEC-2025-0071",
  # bincode: unmaintained
  "RUSTSEC-2025-0141",
  # bytes: integer overflow in BytesMut::reserve
  "RUSTSEC-2026-0007",
  # rand: unsound with custom logger
  "RUSTSEC-2026-0097",
  # rustls-pemfile: unmaintained
  "RUSTSEC-2025-0134",
  # rustls-webpki: CRL distribution point matching
  "RUSTSEC-2026-0049",
  # rustls-webpki: URI name constraints
  "RUSTSEC-2026-0098",
  # rustls-webpki: wildcard name constraints
  "RUSTSEC-2026-0099",
  # rustls-webpki: panic in CRL parsing
  "RUSTSEC-2026-0104",
  # tar: symlink chmod
  "RUSTSEC-2026-0067",
  # tar: PAX size header ignored
  "RUSTSEC-2026-0068",
  # time: stack exhaustion DoS via RFC 2822 parsing
  "RUSTSEC-2026-0009",
  # unic-*: unmaintained
  "RUSTSEC-2025-0081",
  "RUSTSEC-2025-0075",
  "RUSTSEC-2025-0080",
  "RUSTSEC-2025-0094",
  "RUSTSEC-2025-0098",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "Unlicense",
  "Zlib",
  "Unicode-3.0",
]
confidence-threshold = 0.8
# eg { allow = ["Zlib"], name = "adler32", version = "*" },
exceptions = []

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

[licenses.private]
ignore = true

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = ["ankitects"]

[bans]
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# eg { name = "ansi_term", version = "=0.11.0" },
allow = []
deny = []
# Certain crates/versions that will be skipped when doing duplicate detection.
skip = []
# Similarly to `skip` allows you to skip certain crates during duplicate
# detection. Unlike skip, it also includes the entire tree of transitive
# dependencies starting at the specified crate, up to a certain depth, which is
# by default infinite.
# eg { name = "ansi_term", version = "=0.11.0", depth = 20 },
skip-tree = []
