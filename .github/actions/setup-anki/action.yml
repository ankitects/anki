name: Setup Anki Build Environment
description: Install system dependencies, Rust toolchain, uv, and n2

runs:
  using: composite
  steps:
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install --yes --no-install-recommends \
          autoconf \
          bash \
          curl \
          findutils \
          g++ \
          gcc \
          git \
          grep \
          libdbus-1-3 \
          libegl1 \
          libfontconfig1 \
          libgl1 \
          libgstreamer-gl1.0-0 \
          libgstreamer-plugins-base1.0 \
          libgstreamer1.0-0 \
          libnss3 \
          libpulse-mainloop-glib0 \
          libssl-dev \
          libxcomposite1 \
          libxcursor1 \
          libxdamage1 \
          libxi6 \
          libxkbcommon-x11-0 \
          libxkbcommon0 \
          libxkbfile1 \
          libxrandr2 \
          libxrender1 \
          libxtst6 \
          make \
          pkg-config \
          portaudio19-dev \
          python3-dev \
          rsync \
          unzip \
          zstd

    - name: Install rsync (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: |
        /c/msys64/usr/bin/pacman.exe -Sy --noconfirm rsync
        echo "C:\msys64\usr\bin" >> "$GITHUB_PATH"

    # Reads toolchain version from rust-toolchain.toml automatically.
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        components: clippy
        cache: false # ci.yml manages its own cargo cache
        rustflags: "" # don't inject -D warnings; the build system handles this

    # Install uv via setup-uv and point the build system at it via UV_BINARY
    # so it skips downloading its own copy (see build/ninja_gen/src/python.rs).
    - name: Install uv
      id: setup-uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        prune-cache: ${{ runner.os != 'Windows' }} # Windows file-locking breaks cache pruning

    - name: Set UV_BINARY
      shell: bash
      run: echo "UV_BINARY=${{ steps.setup-uv.outputs.uv-path }}" >> "$GITHUB_ENV"

    - name: Install n2
      shell: bash
      run: |
        if ! command -v n2 &>/dev/null; then
          cargo install --git https://github.com/evmar/n2.git --rev 53ec691df749277104d1d4201a344fe4243d6d0a
        fi
