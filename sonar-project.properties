sonar.projectKey=ankitects_anki
sonar.organization=ankitects

sonar.sources=pylib/anki,qt/aqt,qt/tools,ts,rslib
sonar.tests=pylib/tests,qt/tests
sonar.exclusions=out/**,target/**,node_modules/**,**/generated/**,**/*.sql

sonar.python.version=3.11
sonar.python.coverage.reportPaths=\
    out/coverage/python-pylib/coverage.xml,\
    out/coverage/python-qt/coverage.xml

sonar.javascript.lcov.reportPaths=out/coverage/typescript/lcov.info

sonar.rust.coverage.reportPaths=out/coverage/rust/lcov.info