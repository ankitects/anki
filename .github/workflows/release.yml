name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 26.04 for stable, 26.04b1 or 26.04rc1 for pre-release)"
        required: true
        type: string
      dry_run:
        description: "Only build artifacts (skip code signing)"
        default: false
        required: false
        type: boolean
      release:
        description: "Create a GitHub release and publish to PyPI"
        default: true
        required: false
        type: boolean

permissions:
  contents: write

env:
  RELEASE: 2

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pep440_version: ${{ steps.compute.outputs.pep440_version }}
      tag_name: ${{ steps.compute.outputs.tag_name }}
      release_name: ${{ steps.compute.outputs.release_name }}
      is_prerelease: ${{ steps.compute.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute versions and validate
        id: compute
        run: |
          pip install packaging
          current_version=$(cat .version)
          echo "Current .version: $current_version"

          version="${{ inputs.version }}"

          # Validate PEP 440 format, check version order, detect stable vs pre-release
          is_prerelease=$(python3 .github/scripts/validate_version.py "$version" "$current_version")
          echo "Version check passed"

          pep440_version="$version"
          tag_name="$version"
          release_name="Anki $version"

          if [ "${{ inputs.release }}" = "true" ]; then
            if [ "${{ github.ref_type }}" != "branch" ] || [ "${{ github.ref_name }}" != "main" ]; then
              echo "::error::Public releases must be dispatched from main. Got ${{ github.ref }}."
              exit 1
            fi

            # Check for duplicate tag
            if git rev-parse "refs/tags/${tag_name}" >/dev/null 2>&1; then
              echo "::error::Tag '${tag_name}' already exists"
              exit 1
            fi

            # Check for duplicate release
            if gh release view "$tag_name" >/dev/null 2>&1; then
              echo "::error::GitHub release '${tag_name}' already exists"
              exit 1
            fi
          fi

          echo "pep440_version=${pep440_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

          echo "Computed: pep440_version=$pep440_version tag=$tag_name release=$release_name prerelease=$is_prerelease"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check status of the test workflow for this commit
        run: |
          conclusion=$(gh run list \
            --workflow=ci.yml \
            -e push \
            --commit "${{ github.sha }}" \
            --limit 1 \
            --json conclusion \
            --jq ".[0].conclusion")

          if [[ -z "$conclusion" ]]; then
            echo "Could not determine the status of the test workflow for commit ${{ github.sha }}. Aborting..."
            exit 1
          elif [[ "$conclusion" != "success" ]]; then
            echo "The test workflow for commit ${{ github.sha }} concluded with '$conclusion'. Aborting..."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  ftl-sync:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Sync translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 .github/scripts/sync_translations.py
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          ANKI_NO_GIT_PUSH: ${{ inputs.release && '0' || '1' }}

  build-mac:
    needs: [prepare, ftl-sync]
    runs-on: macos-14
    timeout-minutes: 90
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Set up Apple code signing
        if: ${{ inputs.dry_run != true }}
        run: .github/scripts/setup_apple_signing.sh
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

      - name: Build installer
        run: ./tools/build-installer
        env:
          SIGN_IDENTITY: ${{ inputs.dry_run != true && secrets.APPLE_SIGNING_IDENTITY || '' }}

      - name: Clean up signing credentials
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/AuthKey.p8"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: out/installer/dist/

      - name: Build wheels
        run: ./ninja wheels:anki

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: out/wheels/anki-*.whl

  build-mac-intel:
    needs: [prepare, ftl-sync]
    runs-on: macos-15-intel
    timeout-minutes: 90
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Set up Apple code signing
        if: ${{ inputs.dry_run != true }}
        run: .github/scripts/setup_apple_signing.sh
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

      - name: Build installer
        run: ./tools/build-installer
        env:
          SIGN_IDENTITY: ${{ inputs.dry_run != true && secrets.APPLE_SIGNING_IDENTITY || '' }}

      - name: Clean up signing credentials
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP/AuthKey.p8"

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos-intel
          path: out/installer/dist/

      - name: Build wheels
        run: ./ninja wheels:anki

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-intel
          path: out/wheels/anki-*.whl

  build-windows:
    needs: [prepare, ftl-sync]
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: |
          Set-Content -Path .version -Value '${{ needs.prepare.outputs.pep440_version }}' -NoNewline

      - name: Build installer
        run: tools\build-installer.bat

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: out/installer/dist/

      - name: Build wheels
        run: ./tools/ninja wheels:anki

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: out/wheels/anki-*.whl

  build-linux:
    needs: [prepare, ftl-sync]
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: out/installer/dist/

      - name: Build wheels
        run: ./ninja wheels

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux
          # Upload both anki and aqt wheels; the pure-Python aqt wheel is the same on all platforms
          path: out/wheels/*.whl

  build-linux-arm:
    needs: [prepare, ftl-sync]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux-arm
          path: out/installer/dist/

      - name: Build wheels
        run: ./ninja wheels:anki

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-arm
          path: out/wheels/anki-*.whl

  sign-windows:
    if: ${{ inputs.dry_run != true }}
    needs: build-windows
    runs-on: windows-2022
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: dist/

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: anki-signing
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: dist/
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/
          overwrite: true

  release:
    if: ${{ inputs.release == true }}
    needs: [prepare, build-mac, build-mac-intel, sign-windows, build-linux, build-linux-arm]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: dist
          merge-multiple: true

      - name: Update version, commit, and tag (stable)
        if: needs.prepare.outputs.is_prerelease == 'false'
        run: |
          if [ "${{ github.ref_type }}" != "branch" ] || [ "${{ github.ref_name }}" != "main" ]; then
            echo "Stable public releases must be dispatched from main. Got ${{ github.ref }}."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo '${{ needs.prepare.outputs.pep440_version }}' > .version
          git add .version
          git commit -m "Release ${{ needs.prepare.outputs.pep440_version }}"
          git tag '${{ needs.prepare.outputs.tag_name }}'
          git push origin "HEAD:refs/heads/main" '${{ needs.prepare.outputs.tag_name }}'

      - name: Create and push tag (pre-release or dry run)
        if: needs.prepare.outputs.is_prerelease == 'true'
        run: |
          git tag '${{ needs.prepare.outputs.tag_name }}'
          git push origin '${{ needs.prepare.outputs.tag_name }}'

      - name: Create draft release
        run: |
          prerelease_flag=""
          if [ "${{ needs.prepare.outputs.is_prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create '${{ needs.prepare.outputs.tag_name }}' \
            dist/* \
            --draft \
            --title '${{ needs.prepare.outputs.release_name }}' \
            --generate-notes \
            $prerelease_flag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  publish-pypi:
    if: ${{ inputs.release == true }}
    needs: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: wheels
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/
