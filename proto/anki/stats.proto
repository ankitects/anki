syntax = "proto3";

option java_multiple_files = true;

package anki.stats;

import "anki/generic.proto";
import "anki/cards.proto";

service StatsService {
  rpc CardStats(cards.CardId) returns (CardStatsResponse);
  rpc GetReviewLogs(cards.CardId) returns (ReviewLogs);
  rpc Graphs(GraphsRequest) returns (GraphsResponse);
  rpc GetGraphPreferences(generic.Empty) returns (GraphPreferences);
  rpc SetGraphPreferences(GraphPreferences) returns (generic.Empty);
  // Per-tag mastery + an overall memory-readiness band. Read-only.
  rpc TagMastery(TagMasteryRequest) returns (TagMasteryResponse);
  // Batched card -> depth-2 topic lookup. Read-only.
  rpc CardTopics(CardTopicsRequest) returns (CardTopicsResponse);
}

// Implicitly includes any of the above methods that are not listed in the
// backend service.
service BackendStatsService {}

message TagMasteryRequest {
  // Group by the first N components of each `::` tag hierarchy.
  // 1 = top-level tag (good default for AAMC sections). 0 = whole tag.
  uint32 group_depth = 1;
  // Current retrievability at/above which a card counts as "mastered".
  // 0 means "use the server default".
  double mastered_threshold = 2;
  // Optional Anki search to scope the query (e.g. "deck:MileDown").
  // Empty = whole collection.
  string search = 3;
}

message TagMasteryResponse {
  message Group {
    // The tag (or tag prefix) this row aggregates.
    string tag = 1;
    // Cards mapped into this group.
    uint32 total_cards = 2;
    // Cards that had FSRS memory state (the honest denominator).
    uint32 cards_with_state = 3;
    // Cards with current retrievability >= threshold.
    uint32 mastered_cards = 4;
    // Mean current retrievability over cards_with_state.
    double average_recall = 5;
    // Graded reviews on this group's cards (give-up rule).
    uint32 graded_reviews = 6;
  }
  // The effective threshold actually used (echoes the request or the default).
  double threshold_used = 1;
  // Collection-wide give-up-rule inputs.
  uint32 total_graded_reviews = 2;
  uint32 topics_with_reviews = 3;
  repeated Group groups = 4;
  // Overall memory-readiness band: mean current retrievability and its 90%
  // confidence interval over the cards that have FSRS memory state.
  double overall_mean_recall = 5;
  double overall_ci_low = 6;
  double overall_ci_high = 7;
  // Sample size behind the band (the "how-sure" base).
  uint32 overall_n = 8;
  // Give-up rule: false until the collection has enough evidence to show a
  // readiness number (>= a minimum number of graded reviews spanning a
  // minimum number of distinct topics). When false the UI must abstain
  // ("Not enough data yet") regardless of the band above.
  bool enough_data = 9;

  // Total topic groups found (tagged + "(untagged)" sentinel). Always
  // computable.
  uint32 topics_total = 10;
  // Groups with >=1 scored card (cards_with_state >= 1). Independent of give-up
  // rule.
  uint32 topics_covered = 11;
  // Confidence in the overall band. See derivation below.
  HowSure how_sure = 12;
  // Unix seconds of the most recent graded revlog entry across searched cards.
  // 0 == "no graded reviews yet" — frontend renders "no reviews yet", never
  // epoch/1970.
  int64 last_updated_secs = 13;
  // Best next topic: lowest-average_recall covered group; if none covered,
  // largest (by total_cards) group; if no groups (topics_total==0), "".
  string next_topic = 14;

  enum HowSure {
    INSUFFICIENT = 0;  // n == 0
    LOW = 1;           // n > 0, not MEDIUM/HIGH
    MEDIUM = 2;        // half_width <= 0.05 AND n >= 30
    HIGH = 3;          // half_width <= 0.02 AND n >= 100
  }
}

message CardTopicsRequest {
  repeated int64 card_ids = 1;
  uint32 group_depth = 2;  // 2 = depth-2 topic
}

message CardTopicsResponse {
  message Entry {
    int64 card_id = 1;
    string topic = 2;
  }
  repeated Entry entries = 1;
  // Echoes rslib's UNTAGGED sentinel "(untagged)"; frontend maps to "Other".
  string untagged_sentinel = 2;
}

message ReviewLogs {
  repeated CardStatsResponse.StatsRevlogEntry entries = 1;
}

message CardStatsResponse {
  message StatsRevlogEntry {
    int64 time = 1;
    RevlogEntry.ReviewKind review_kind = 2;
    uint32 button_chosen = 3;
    // seconds
    uint32 interval = 4;
    // per mill
    uint32 ease = 5;
    float taken_secs = 6;
    optional cards.FsrsMemoryState memory_state = 7;
    // seconds
    uint32 last_interval = 8;
  }
  repeated StatsRevlogEntry revlog = 1;
  int64 card_id = 2;
  int64 note_id = 3;
  string deck = 4;
  // Unix timestamps
  int64 added = 5;
  optional int64 first_review = 6;
  optional int64 latest_review = 7;
  optional int64 due_date = 8;
  optional int32 due_position = 9;
  // days
  uint32 interval = 10;
  // per mill
  uint32 ease = 11;
  uint32 reviews = 12;
  uint32 lapses = 13;
  float average_secs = 14;
  float total_secs = 15;
  string card_type = 16;
  string notetype = 17;
  optional cards.FsrsMemoryState memory_state = 18;
  // not set if due date/state not available
  optional float fsrs_retrievability = 19;
  string custom_data = 20;
  string preset = 21;
  optional string original_deck = 22;
  optional float desired_retention = 23;
  repeated float fsrs_params = 24;
}

message GraphsRequest {
  string search = 1;
  uint32 days = 2;
}

message GraphsResponse {
  message Added {
    map<int32, uint32> added = 1;
  }
  message Intervals {
    map<uint32, uint32> intervals = 1;
  }
  message Eases {
    map<uint32, uint32> eases = 1;
    float average = 2;
  }
  message Retrievability {
    map<uint32, uint32> retrievability = 1;
    float average = 2;
    float sum_by_card = 3;
    float sum_by_note = 4;
  }
  message FutureDue {
    map<int32, uint32> future_due = 1;
    bool have_backlog = 2;
    uint32 daily_load = 3;
  }
  message Today {
    uint32 answer_count = 1;
    uint32 answer_millis = 2;
    uint32 correct_count = 3;
    uint32 mature_correct = 4;
    uint32 mature_count = 5;
    uint32 learn_count = 6;
    uint32 review_count = 7;
    uint32 relearn_count = 8;
    uint32 early_review_count = 9;
  }
  // each bucket is a 24 element vec
  message Hours {
    message Hour {
      uint32 total = 1;
      uint32 correct = 2;
    }
    repeated Hour one_month = 1;
    repeated Hour three_months = 2;
    repeated Hour one_year = 3;
    repeated Hour all_time = 4;
  }
  message ReviewCountsAndTimes {
    message Reviews {
      uint32 learn = 1;
      uint32 relearn = 2;
      uint32 young = 3;
      uint32 mature = 4;
      uint32 filtered = 5;
    }
    map<int32, Reviews> count = 1;
    map<int32, Reviews> time = 2;
  }
  // 4 element vecs for buttons 1-4
  message Buttons {
    message ButtonCounts {
      repeated uint32 learning = 1;
      repeated uint32 young = 2;
      repeated uint32 mature = 3;
    }
    ButtonCounts one_month = 1;
    ButtonCounts three_months = 2;
    ButtonCounts one_year = 3;
    ButtonCounts all_time = 4;
  }
  message CardCounts {
    message Counts {
      uint32 newCards = 1;
      uint32 learn = 2;
      uint32 relearn = 3;
      uint32 young = 4;
      uint32 mature = 5;
      uint32 suspended = 6;
      uint32 buried = 7;
    }
    // Buried/suspended cards are included in counts; suspended/buried counts
    // are 0.
    Counts including_inactive = 1;
    // Buried/suspended cards are counted separately.
    Counts excluding_inactive = 2;
  }
  message TrueRetentionStats {
    message TrueRetention {
      uint32 young_passed = 1;
      uint32 young_failed = 2;
      uint32 mature_passed = 3;
      uint32 mature_failed = 4;
    }

    TrueRetention today = 1;
    TrueRetention yesterday = 2;
    TrueRetention week = 3;
    TrueRetention month = 4;
    TrueRetention year = 5;
    TrueRetention all_time = 6;
  }

  Buttons buttons = 1;
  CardCounts card_counts = 2;
  Hours hours = 3;
  Today today = 4;
  Eases eases = 5;
  Eases difficulty = 11;
  Intervals intervals = 6;
  FutureDue future_due = 7;
  Added added = 8;
  ReviewCountsAndTimes reviews = 9;
  uint32 rollover_hour = 10;
  Retrievability retrievability = 12;
  bool fsrs = 13;
  Intervals stability = 14;
  TrueRetentionStats true_retention = 15;
}

message GraphPreferences {
  enum Weekday {
    SUNDAY = 0;
    MONDAY = 1;
    FRIDAY = 5;
    SATURDAY = 6;
  }
  Weekday calendar_first_day_of_week = 1;
  bool card_counts_separate_inactive = 2;
  bool browser_links_supported = 3;
  bool future_due_show_backlog = 4;
}

message RevlogEntry {
  enum ReviewKind {
    LEARNING = 0;
    REVIEW = 1;
    RELEARNING = 2;
    FILTERED = 3;
    MANUAL = 4;
    RESCHEDULED = 5;
  }
  int64 id = 1;
  int64 cid = 2;
  int32 usn = 3;
  uint32 button_chosen = 4;
  int32 interval = 5;
  int32 last_interval = 6;
  uint32 ease_factor = 7;
  uint32 taken_millis = 8;
  ReviewKind review_kind = 9;
}

message CardEntry {
  int64 id = 1;
  int64 note_id = 2;
  int64 deck_id = 3;
}

message DeckEntry {
  int64 id = 1;
  int64 parent_id = 2;
  int64 preset_id = 3;
}

message Dataset {
  repeated RevlogEntry revlogs = 1;
  repeated CardEntry cards = 2;
  repeated DeckEntry decks = 3;
  int64 next_day_at = 4;
}
