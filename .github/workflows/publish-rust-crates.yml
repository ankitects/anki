name: Publish Rust crates

on:
  workflow_dispatch: # TODO: change this once we have a way to publish crates automatically
    inputs:
      dry_run:
        description: "Run cargo publish --dry-run only"
        type: boolean
        required: true
        default: true

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Publish crates (in dependency order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euxo pipefail

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN="--dry-run"
          else
            DRY_RUN=""
          fi

          # Workspace crates required by `anki`
          cargo publish -p anki_io $DRY_RUN
          cargo publish -p anki_proto_gen $DRY_RUN
          cargo publish -p anki_i18n $DRY_RUN
          cargo publish -p anki_proto $DRY_RUN
          cargo publish -p anki $DRY_RUN

