syntax = "proto3";

option java_multiple_files = true;

package anki.github;

import "anki/generic.proto";

service GithubService {}

service BackendGithubService {
  rpc GetLatestRelease(LatestReleaseRequest) returns (GithubRelease);
  rpc DownloadRelease(GithubRelease) returns (generic.String);
}

message LatestReleaseRequest {
  bool include_prerelease = 1;
}

message GithubRelease {
  string tag_name = 1;
  string filename = 2;
  string url = 3;
  string checksum = 4;
}
