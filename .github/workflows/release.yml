name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 26.04 for stable, 26.04b1 or 26.04rc1 for pre-release)"
        required: true
        type: string
      dry_run:
        description: "Only build artifacts"
        default: false
        required: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pep440_version: ${{ steps.compute.outputs.pep440_version }}
      tag_name: ${{ steps.compute.outputs.tag_name }}
      release_name: ${{ steps.compute.outputs.release_name }}
      is_prerelease: ${{ steps.compute.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute versions and validate
        id: compute
        run: |
          pip install packaging
          current_version=$(cat .version)
          echo "Current .version: $current_version"

          version="${{ inputs.version }}"

          # Validate PEP 440 format, check version order, detect stable vs pre-release
          is_prerelease=$(python3 .github/scripts/validate_version.py "$version" "$current_version")
          echo "Version check passed"

          pep440_version="$version"
          tag_name="$version"
          release_name="Anki $version"

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            # Check for duplicate tag
            if git rev-parse "refs/tags/${tag_name}" >/dev/null 2>&1; then
              echo "::error::Tag '${tag_name}' already exists"
              exit 1
            fi

            # Check for duplicate release
            if gh release view "$tag_name" >/dev/null 2>&1; then
              echo "::error::GitHub release '${tag_name}' already exists"
              exit 1
            fi
          fi

          echo "pep440_version=${pep440_version}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

          echo "Computed: pep440_version=$pep440_version tag=$tag_name release=$release_name prerelease=$is_prerelease"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check status of the last run of the test workflow
        run: |
          conclusion=$(gh run list \
            --workflow=ci.yml \
            -b main \
            -e push \
            --limit 1 \
            --json conclusion \
            --jq ".[0].conclusion")

          if [[ -z "$conclusion" ]]; then
            echo "Could not determine the status of the most recent test run on the main branch. Aborting..."
            exit 1
          elif [[ "$conclusion" != "success" ]]; then
            echo "The last run of the test workflow on the main branch was not successful. Aborting..."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  ftl-sync:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Sync translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          python3 .github/scripts/sync_translations.py
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          ANKI_NO_GIT_PUSH: ${{ inputs.dry_run && '1' || '0' }}

  build-mac:
    needs: [prepare, ftl-sync]
    runs-on: macos-14
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos
          path: out/installer/dist/

  build-mac-intel:
    needs: [prepare, ftl-sync]
    runs-on: macos-15-intel
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-macos-intel
          path: out/installer/dist/

  build-windows:
    needs: [prepare, ftl-sync]
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: |
          Set-Content -Path .version -Value '${{ needs.prepare.outputs.pep440_version }}' -NoNewline

      - name: Build installer
        run: tools\build-installer.bat

      - uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: out/installer/dist/

  build-linux:
    needs: [prepare, ftl-sync]
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: out/installer/dist/

  build-linux-arm:
    needs: [prepare, ftl-sync]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-anki

      - name: Write version
        run: echo '${{ needs.prepare.outputs.pep440_version }}' > .version

      - name: Build installer
        run: ./tools/build-installer

      - uses: actions/upload-artifact@v4
        with:
          name: installer-linux-arm
          path: out/installer/dist/

  sign-windows:
    needs: build-windows
    runs-on: windows-2022
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: dist/

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: anki-signing
          certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
          files-folder: dist/
          files-folder-filter: msi
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-upload signed artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: dist/
          overwrite: true

  release:
    if: ${{ inputs.dry_run == 'false' }}
    needs: [prepare, build-mac, build-mac-intel, sign-windows, build-linux, build-linux-arm]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Update version, commit, and tag (stable)
        if: needs.prepare.outputs.is_prerelease == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo '${{ needs.prepare.outputs.pep440_version }}' > .version
          git add .version
          git commit -m "Release ${{ needs.prepare.outputs.pep440_version }}"
          git tag '${{ needs.prepare.outputs.tag_name }}'
          git push origin HEAD '${{ needs.prepare.outputs.tag_name }}'

      - name: Create and push tag (pre-release or dry run)
        if: needs.prepare.outputs.is_prerelease == 'true'
        run: |
          git tag '${{ needs.prepare.outputs.tag_name }}'
          git push origin '${{ needs.prepare.outputs.tag_name }}'

      - name: Create draft release
        run: |
          prerelease_flag=""
          if [ "${{ needs.prepare.outputs.is_prerelease }}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          gh release create '${{ needs.prepare.outputs.tag_name }}' \
            dist/* \
            --draft \
            --title '${{ needs.prepare.outputs.release_name }}' \
            --generate-notes \
            $prerelease_flag
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
